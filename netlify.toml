# Deploy the Next.js app from /web (Ultronios chat + /api/agent).
#
# In Netlify → Site settings → Build & deploy: do NOT set "Publish directory" to `web`
# (that equals the base dir and breaks @netlify/plugin-nextjs). Leave publish empty in the UI.
#
# With base = "web", `publish` is resolved under that folder — use `.next`, not `web/.next`
# (otherwise Netlify looks for web/web/.next).

[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
