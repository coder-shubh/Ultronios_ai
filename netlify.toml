# Deploy the Next.js app from /web (Ultronios chat + /api/agent).
#
# In Netlify → Site settings → Build & deploy: do NOT set "Publish directory" to `web`
# (that equals the base dir and breaks @netlify/plugin-nextjs). Leave publish empty in the
# UI, or rely on publish below.

[build]
  base = "web"
  command = "npm run build"
  # Repo-root-relative path; must differ from base (`web`). Overrides wrong UI publish = web.
  publish = "web/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
